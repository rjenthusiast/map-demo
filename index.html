<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>WanderCebu — Map Discovery Demo</title>
<link href="https://unpkg.com/maplibre-gl@4.7.1/dist/maplibre-gl.css" rel="stylesheet" />
<script src="https://unpkg.com/maplibre-gl@4.7.1/dist/maplibre-gl.js"></script>
<style>
  :root{
    --ink:#0F2A43; --accent:#1E9E8A; --accent-d:#14806F;
    --grey:#5B6B78; --line:#E3EAED; --panel:#F7FAFA; --bg:#EEF3F4;
    --hotel:#2563EB; --tour:#1E9E8A; --event:#F59E0B; --transport:#8B5CF6;
    --shadow:0 6px 22px rgba(15,42,67,.10);
  }
  *{box-sizing:border-box;margin:0;padding:0}
  html,body{height:100%;font-family:-apple-system,BlinkMacSystemFont,"Segoe UI",Roboto,Helvetica,Arial,sans-serif;color:var(--ink);background:var(--bg)}
  #app{display:flex;height:100vh;overflow:hidden}

  /* ---------- Sidebar ---------- */
  #sidebar{width:390px;min-width:390px;height:100%;background:#fff;display:flex;flex-direction:column;box-shadow:var(--shadow);z-index:5}
  .brand{padding:18px 20px 14px;background:var(--ink);color:#fff}
  .brand h1{font-size:20px;font-weight:800;letter-spacing:.2px;display:flex;align-items:center;gap:8px}
  .brand h1 .pin{color:var(--accent)}
  .brand p{font-size:12px;color:#B9D4CE;margin-top:3px}
  .brand .badge{display:inline-block;margin-top:10px;font-size:10.5px;font-weight:600;letter-spacing:.4px;background:rgba(30,158,138,.18);color:#7FE9D6;padding:4px 9px;border-radius:20px;text-transform:uppercase}

  .controls{padding:14px 16px 6px;border-bottom:1px solid var(--line)}
  .search{position:relative}
  .search input{width:100%;padding:11px 14px 11px 38px;border:1.5px solid var(--line);border-radius:10px;font-size:13.5px;outline:none;transition:.15s}
  .search input:focus{border-color:var(--accent)}
  .search svg{position:absolute;left:12px;top:11px;width:16px;height:16px;stroke:var(--grey)}

  .chips{display:flex;flex-wrap:wrap;gap:7px;margin-top:11px}
  .chip{display:flex;align-items:center;gap:6px;font-size:12px;font-weight:600;padding:6px 11px;border-radius:20px;border:1.5px solid var(--line);background:#fff;cursor:pointer;user-select:none;transition:.13s;color:var(--grey)}
  .chip .dot{width:9px;height:9px;border-radius:50%}
  .chip[data-cat="hotel"] .dot{background:var(--hotel)} .chip[data-cat="tour"] .dot{background:var(--tour)}
  .chip[data-cat="event"] .dot{background:var(--event)} .chip[data-cat="transport"] .dot{background:var(--transport)}
  .chip.active{color:#fff;border-color:transparent}
  .chip.active[data-cat="hotel"]{background:var(--hotel)} .chip.active[data-cat="tour"]{background:var(--accent-d)}
  .chip.active[data-cat="event"]{background:var(--event)} .chip.active[data-cat="transport"]{background:var(--transport)}
  .chip.active[data-cat="all"]{background:var(--ink)}
  .chip.active .dot{background:#fff!important}

  .filters{display:flex;gap:14px;align-items:center;margin-top:13px;flex-wrap:wrap}
  .filters .f{flex:1;min-width:120px}
  .filters label{font-size:11px;font-weight:700;color:var(--grey);text-transform:uppercase;letter-spacing:.4px;display:flex;justify-content:space-between}
  .filters label b{color:var(--accent-d)}
  input[type=range]{width:100%;accent-color:var(--accent);margin-top:5px}
  .stars{display:flex;gap:3px;margin-top:5px;cursor:pointer}
  .stars span{font-size:17px;color:#D6DEE1;transition:.1s} .stars span.on{color:#F5B301}

  .actionbar{display:flex;gap:8px;margin:12px 0 4px}
  .btn{flex:1;font-size:12.5px;font-weight:600;padding:9px;border-radius:9px;border:1.5px solid var(--line);background:#fff;cursor:pointer;display:flex;align-items:center;justify-content:center;gap:6px;transition:.13s;color:var(--ink)}
  .btn:hover{border-color:var(--accent)}
  .btn.primary{background:var(--accent);border-color:var(--accent);color:#fff}
  .btn.primary:hover{background:var(--accent-d)}
  .btn svg{width:15px;height:15px}

  .resultbar{padding:11px 16px;font-size:12px;color:var(--grey);font-weight:600;display:flex;justify-content:space-between;align-items:center;background:var(--panel)}
  .resultbar b{color:var(--ink)}
  .sortsel{font-size:11.5px;border:1px solid var(--line);border-radius:7px;padding:4px 6px;color:var(--ink);background:#fff}

  #list{flex:1;overflow-y:auto;padding:8px 12px 20px}
  .card{display:flex;gap:12px;padding:11px;border:1px solid var(--line);border-radius:12px;margin-bottom:10px;cursor:pointer;background:#fff;transition:.13s}
  .card:hover{border-color:var(--accent);box-shadow:var(--shadow);transform:translateY(-1px)}
  .card.sel{border-color:var(--accent);box-shadow:var(--shadow)}
  .thumb{width:66px;height:66px;min-width:66px;border-radius:10px;display:flex;align-items:center;justify-content:center;font-size:27px;color:#fff}
  .card .info{flex:1;min-width:0}
  .card h3{font-size:14px;font-weight:700;line-height:1.25}
  .card .cat{font-size:10.5px;font-weight:700;letter-spacing:.4px;text-transform:uppercase;margin-top:2px}
  .card .meta{display:flex;align-items:center;gap:10px;margin-top:7px;font-size:12px;color:var(--grey);flex-wrap:wrap}
  .card .price{font-weight:800;color:var(--ink)} .card .price span{font-weight:500;color:var(--grey);font-size:11px}
  .card .rate{color:#F5B301;font-weight:700} .card .rate small{color:var(--grey);font-weight:500}
  .card .dist{background:var(--panel);padding:2px 7px;border-radius:20px;font-size:11px;font-weight:600;color:var(--accent-d)}
  .empty{text-align:center;color:var(--grey);padding:40px 20px;font-size:13px}
  .empty div{font-size:34px;margin-bottom:8px}

  /* ---------- Map ---------- */
  #map{flex:1;height:100%}
  .marker{width:34px;height:34px;border-radius:50% 50% 50% 2px;transform:rotate(45deg);display:flex;align-items:center;justify-content:center;box-shadow:0 3px 8px rgba(0,0,0,.35);border:2.5px solid #fff;cursor:pointer;transition:.15s}
  .marker span{transform:rotate(-45deg);font-size:15px}
  .marker.hotel{background:var(--hotel)} .marker.tour{background:var(--tour)}
  .marker.event{background:var(--event)} .marker.transport{background:var(--transport)}
  .marker:hover,.marker.active{transform:rotate(45deg) scale(1.22);z-index:10}
  .me{width:18px;height:18px;background:#2563EB;border:3px solid #fff;border-radius:50%;box-shadow:0 0 0 6px rgba(37,99,235,.25)}

  .maplibregl-popup-content{border-radius:12px;padding:0;overflow:hidden;box-shadow:var(--shadow);font-family:inherit;width:230px}
  .pop-top{height:76px;display:flex;align-items:center;justify-content:center;font-size:34px;color:#fff}
  .pop-body{padding:11px 13px 13px}
  .pop-body h3{font-size:14.5px;font-weight:800;color:var(--ink)}
  .pop-body .pcat{font-size:10px;font-weight:700;letter-spacing:.4px;text-transform:uppercase;color:var(--grey);margin-top:2px}
  .pop-body .prow{display:flex;justify-content:space-between;align-items:center;margin-top:9px}
  .pop-body .pprice{font-weight:800;color:var(--ink);font-size:14px} .pop-body .pprice span{font-size:11px;font-weight:500;color:var(--grey)}
  .pop-body .prate{color:#F5B301;font-weight:700;font-size:12.5px}
  .pop-body .pbtn{margin-top:11px;width:100%;background:var(--accent);color:#fff;border:none;padding:8px;border-radius:8px;font-weight:700;font-size:12.5px;cursor:pointer}
  .pop-body .pbtn:hover{background:var(--accent-d)}

  .attr{position:absolute;bottom:6px;left:6px;font-size:10px;color:#5B6B78;background:rgba(255,255,255,.75);padding:2px 7px;border-radius:5px;z-index:2}
  .float-tag{position:absolute;top:14px;right:14px;z-index:3;background:#fff;box-shadow:var(--shadow);border-radius:10px;padding:8px 13px;font-size:11.5px;font-weight:700;color:var(--ink);display:flex;align-items:center;gap:7px}
  .float-tag .live{width:8px;height:8px;border-radius:50%;background:var(--accent);box-shadow:0 0 0 4px rgba(30,158,138,.2);animation:pulse 1.6s infinite}
  @keyframes pulse{0%{box-shadow:0 0 0 0 rgba(30,158,138,.35)}70%{box-shadow:0 0 0 8px rgba(30,158,138,0)}100%{box-shadow:0 0 0 0 rgba(30,158,138,0)}}

  @media(max-width:820px){#sidebar{width:300px;min-width:300px}}
</style>
</head>
<body>
<div id="app">
  <aside id="sidebar">
    <div class="brand">
      <h1><span class="pin">◆</span> WanderCebu</h1>
      <p>Discover hotels, tours, events &amp; transport across Cebu</p>
    </div>

    <div class="controls">
      <div class="search">
        <svg viewBox="0 0 24 24" fill="none" stroke-width="2" stroke-linecap="round"><circle cx="11" cy="11" r="7"/><path d="M21 21l-4.3-4.3"/></svg>
        <input id="q" type="text" placeholder="Search by name or place…" />
      </div>

      <div class="chips" id="chips">
        <div class="chip active" data-cat="all"><span class="dot"></span>All</div>
        <div class="chip" data-cat="hotel"><span class="dot"></span>Hotels</div>
        <div class="chip" data-cat="tour"><span class="dot"></span>Tours</div>
        <div class="chip" data-cat="event"><span class="dot"></span>Events</div>
        <div class="chip" data-cat="transport"><span class="dot"></span>Transport</div>
      </div>

      <div class="filters">
        <div class="f">
          <label>Max price <b id="priceVal">₱10,000</b></label>
          <input type="range" id="price" min="500" max="10000" step="250" value="10000" />
        </div>
        <div class="f">
          <label>Min rating <b id="rateVal">Any</b></label>
          <div class="stars" id="stars">
            <span data-v="1">★</span><span data-v="2">★</span><span data-v="3">★</span><span data-v="4">★</span><span data-v="5">★</span>
          </div>
        </div>
      </div>

      <div class="actionbar">
        <button class="btn primary" id="near">
          <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round"><circle cx="12" cy="10" r="3"/><path d="M12 2v3M12 19v3M2 12h3M19 12h3"/><path d="M12 21s7-5.686 7-11a7 7 0 10-14 0c0 5.314 7 11 7 11z"/></svg>
          Near me
        </button>
        <button class="btn" id="reset">
          <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round"><path d="M3 12a9 9 0 109-9 9 9 0 00-6.5 2.8L3 8"/><path d="M3 3v5h5"/></svg>
          Reset
        </button>
      </div>
    </div>

    <div class="resultbar">
      <span><b id="count">0</b> places found</span>
      <select class="sortsel" id="sort">
        <option value="featured">Sort: Featured</option>
        <option value="price">Price: Low to High</option>
        <option value="rating">Rating: High to Low</option>
        <option value="dist">Distance: Nearest</option>
      </select>
    </div>

    <div id="list"></div>
  </aside>

  <div id="map">
    <div class="float-tag"><span class="live"></span> 16 live listings · Cebu, PH</div>
    <div class="attr">© OpenStreetMap · CARTO · MapLibre GL</div>
  </div>
</div>

<script>
const ICON = {hotel:'🏨', tour:'🧭', event:'🎉', transport:'🚐'};
const LABEL = {hotel:'Hotel', tour:'Tour', event:'Event', transport:'Transport'};
const COLOR = {hotel:'#2563EB', tour:'#1E9E8A', event:'#F59E0B', transport:'#8B5CF6'};
const GRAD = {
  hotel:'linear-gradient(135deg,#2563EB,#60A5FA)',
  tour:'linear-gradient(135deg,#14806F,#34D399)',
  event:'linear-gradient(135deg,#D97706,#FBBF24)',
  transport:'linear-gradient(135deg,#7C3AED,#C4B5FD)'
};

// Sample tourism listings around Cebu, Philippines
const PLACES = [
  {id:1, name:"Radisson Blu Cebu", cat:"hotel", price:6200, rating:4.7, lng:123.9036, lat:10.2967, note:"5-star bayfront near SM City"},
  {id:2, name:"Bai Hotel Mandaue", cat:"hotel", price:4800, rating:4.6, lng:123.9420, lat:10.3320, note:"Rooftop pool & sky bar"},
  {id:3, name:"Casa Verde Guesthouse", cat:"hotel", price:1400, rating:4.4, lng:123.8980, lat:10.3170, note:"Budget stay in IT Park"},
  {id:4, name:"Kandaya Resort Wing", cat:"hotel", price:9200, rating:4.9, lng:123.9540, lat:10.3560, note:"Beachfront luxury villas"},
  {id:5, name:"Kawasan Falls Canyoneering", cat:"tour", price:2500, rating:4.9, lng:123.8710, lat:10.2760, note:"Full-day guided adventure"},
  {id:6, name:"Oslow Whale Shark Watching", cat:"tour", price:3200, rating:4.5, lng:123.8620, lat:10.3390, note:"Sunrise boat + snorkel gear"},
  {id:7, name:"Cebu Heritage Walk", cat:"tour", price:800, rating:4.6, lng:123.9010, lat:10.2940, note:"Magellan's Cross & Basilica"},
  {id:8, name:"Island Hopping — Mactan", cat:"tour", price:1800, rating:4.7, lng:123.9720, lat:10.3080, note:"3 islands, lunch included"},
  {id:9, name:"Sinulog Street Festival", cat:"event", price:500, rating:4.8, lng:123.8930, lat:10.3010, note:"Grandstand seat · Jan"},
  {id:10, name:"Cebu Food & Lechon Fair", cat:"event", price:650, rating:4.5, lng:123.9120, lat:10.3230, note:"Weekend tasting passes"},
  {id:11, name:"Sky Lounge Live Jazz", cat:"event", price:900, rating:4.3, lng:123.9060, lat:10.3150, note:"Fri night · IT Park"},
  {id:12, name:"Airport Private Transfer", cat:"transport", price:1200, rating:4.7, lng:123.9790, lat:10.3090, note:"MCIA ↔ hotel, van"},
  {id:13, name:"Cebu City Car Rental", cat:"transport", price:2200, rating:4.4, lng:123.8955, lat:10.3110, note:"Self-drive SUV / day"},
  {id:14, name:"Scooter Rental — Mactan", cat:"transport", price:600, rating:4.2, lng:123.9680, lat:10.2990, note:"Explore beaches freely"},
  {id:15, name:"Moalboal Diving Day-Trip", cat:"tour", price:3800, rating:4.8, lng:123.8560, lat:10.2650, note:"Sardine run + turtles"},
  {id:16, name:"Seda Central Bloc", cat:"hotel", price:5400, rating:4.6, lng:123.9068, lat:10.3286, note:"Modern IT Park tower"}
];

const state = { cats:new Set(['all']), q:'', price:10000, rating:0, sort:'featured', me:null, sel:null };
const markers = {};
let meMarker = null;

const map = new maplibregl.Map({
  container:'map',
  style:{
    version:8,
    sources:{carto:{type:'raster',tiles:[
      'https://a.basemaps.cartocdn.com/light_all/{z}/{x}/{y}.png',
      'https://b.basemaps.cartocdn.com/light_all/{z}/{x}/{y}.png',
      'https://c.basemaps.cartocdn.com/light_all/{z}/{x}/{y}.png'
    ],tileSize:256,attribution:'© OpenStreetMap © CARTO'}},
    layers:[{id:'carto',type:'raster',source:'carto'}]
  },
  center:[123.912,10.313], zoom:12.2, attributionControl:false
});
map.addControl(new maplibregl.NavigationControl({showCompass:false}),'bottom-right');

function dist(a,b){ // km, haversine
  const R=6371,dLat=(b.lat-a.lat)*Math.PI/180,dLng=(b.lng-a.lng)*Math.PI/180;
  const x=Math.sin(dLat/2)**2+Math.cos(a.lat*Math.PI/180)*Math.cos(b.lat*Math.PI/180)*Math.sin(dLng/2)**2;
  return R*2*Math.atan2(Math.sqrt(x),Math.sqrt(1-x));
}
const peso = n => '₱'+n.toLocaleString();

// Build markers once
map.on('load',()=>{
  PLACES.forEach(p=>{
    const el=document.createElement('div');
    el.className='marker '+p.cat;
    el.innerHTML='<span>'+ICON[p.cat]+'</span>';
    const popup=new maplibregl.Popup({offset:26,closeButton:false}).setHTML(popupHTML(p));
    const m=new maplibregl.Marker({element:el,anchor:'bottom'}).setLngLat([p.lng,p.lat]).setPopup(popup).addTo(map);
    el.addEventListener('click',()=>select(p.id,true));
    markers[p.id]={marker:m,el,popup};
  });
  render();
});

function popupHTML(p){
  return `<div class="pop-top" style="background:${GRAD[p.cat]}">${ICON[p.cat]}</div>
  <div class="pop-body">
    <h3>${p.name}</h3>
    <div class="pcat" style="color:${COLOR[p.cat]}">${LABEL[p.cat]} · ${p.note}</div>
    <div class="prow">
      <div class="pprice">${peso(p.price)} <span>${p.cat==='hotel'?'/night':''}</span></div>
      <div class="prate">★ ${p.rating.toFixed(1)}</div>
    </div>
    <button class="pbtn" onclick="alert('Booking flow → Phase 1 deliverable ✅')">View &amp; Book</button>
  </div>`;
}

function visible(){
  let out = PLACES.filter(p=>{
    if(!state.cats.has('all') && !state.cats.has(p.cat)) return false;
    if(state.q && !(p.name+' '+p.note).toLowerCase().includes(state.q)) return false;
    if(p.price>state.price) return false;
    if(p.rating<state.rating) return false;
    return true;
  });
  if(state.me) out.forEach(p=>p._d=dist(state.me,p));
  const s=state.sort;
  out.sort((a,b)=> s==='price'? a.price-b.price : s==='rating'? b.rating-a.rating :
    s==='dist'&&state.me? a._d-b._d : b.rating*Math.log(b.price)-a.rating*Math.log(a.price));
  return out;
}

function render(){
  const vis=visible(); const ids=new Set(vis.map(p=>p.id));
  PLACES.forEach(p=>{ if(markers[p.id]) markers[p.id].el.style.display = ids.has(p.id)?'flex':'none'; });

  document.getElementById('count').textContent=vis.length;
  const list=document.getElementById('list');
  if(!vis.length){ list.innerHTML='<div class="empty"><div>🗺️</div>No places match your filters.<br>Try widening price or rating.</div>'; return; }
  list.innerHTML=vis.map(p=>`
    <div class="card ${state.sel===p.id?'sel':''}" data-id="${p.id}">
      <div class="thumb" style="background:${GRAD[p.cat]}">${ICON[p.cat]}</div>
      <div class="info">
        <h3>${p.name}</h3>
        <div class="cat" style="color:${COLOR[p.cat]}">${LABEL[p.cat]}</div>
        <div class="meta">
          <span class="price">${peso(p.price)}<span>${p.cat==='hotel'?' /night':''}</span></span>
          <span class="rate">★ ${p.rating.toFixed(1)} <small>(${LABEL[p.cat]})</small></span>
          ${state.me?`<span class="dist">${p._d.toFixed(1)} km</span>`:''}
        </div>
      </div>
    </div>`).join('');
  list.querySelectorAll('.card').forEach(c=>c.addEventListener('click',()=>select(+c.dataset.id,true)));
}

function select(id,fly){
  state.sel=id; const p=PLACES.find(x=>x.id===id);
  Object.values(markers).forEach(m=>m.el.classList.remove('active'));
  markers[id].el.classList.add('active');
  if(fly){ map.flyTo({center:[p.lng,p.lat],zoom:14.4,speed:.9}); markers[id].marker.togglePopup(); }
  render();
}

// ---- Controls ----
document.getElementById('chips').addEventListener('click',e=>{
  const c=e.target.closest('.chip'); if(!c)return;
  const cat=c.dataset.cat;
  if(cat==='all'){ state.cats=new Set(['all']); }
  else{
    state.cats.delete('all');
    state.cats.has(cat)?state.cats.delete(cat):state.cats.add(cat);
    if(!state.cats.size) state.cats=new Set(['all']);
  }
  document.querySelectorAll('.chip').forEach(ch=>ch.classList.toggle('active',state.cats.has(ch.dataset.cat)));
  render();
});
document.getElementById('q').addEventListener('input',e=>{state.q=e.target.value.toLowerCase().trim();render();});
const price=document.getElementById('price');
price.addEventListener('input',e=>{state.price=+e.target.value;document.getElementById('priceVal').textContent=peso(state.price);render();});
document.getElementById('stars').addEventListener('click',e=>{
  const v=+e.target.dataset.v||0;
  state.rating = (state.rating===v)?0:v;
  document.querySelectorAll('#stars span').forEach(s=>s.classList.toggle('on',+s.dataset.v<=state.rating));
  document.getElementById('rateVal').textContent = state.rating?state.rating+'★+':'Any';
  render();
});
document.getElementById('sort').addEventListener('change',e=>{state.sort=e.target.value;render();});
document.getElementById('near').addEventListener('click',()=>{
  // Demo geolocation: drop "you" at Cebu IT Park and find nearest
  const me={lng:123.9060,lat:10.3170}; state.me=me; state.sort='dist';
  document.getElementById('sort').value='dist';
  if(meMarker) meMarker.remove();
  const el=document.createElement('div'); el.className='me';
  meMarker=new maplibregl.Marker({element:el}).setLngLat([me.lng,me.lat]).addTo(map);
  map.flyTo({center:[me.lng,me.lat],zoom:13.2,speed:.9});
  render();
});
document.getElementById('reset').addEventListener('click',()=>{
  state.cats=new Set(['all']);state.q='';state.price=10000;state.rating=0;state.sort='featured';state.me=null;state.sel=null;
  if(meMarker){meMarker.remove();meMarker=null;}
  document.getElementById('q').value='';price.value=10000;document.getElementById('priceVal').textContent='₱10,000';
  document.getElementById('rateVal').textContent='Any';document.getElementById('sort').value='featured';
  document.querySelectorAll('#stars span').forEach(s=>s.classList.remove('on'));
  document.querySelectorAll('.chip').forEach(ch=>ch.classList.toggle('active',ch.dataset.cat==='all'));
  map.flyTo({center:[123.912,10.313],zoom:12.2,speed:.9});
  render();
});
</script>
</body>
</html>
